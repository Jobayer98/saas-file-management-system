paths:
  /admin/stats/overview:
    get:
      tags:
        - Admin - Statistics
      summary: Get dashboard overview statistics
      description: Retrieve overall system statistics including users, subscriptions, storage, and popular packages
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Overview statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Overview statistics retrieved successfully
                  data:
                    type: object
                    properties:
                      totalUsers:
                        type: integer
                        example: 1250
                        description: Total number of registered users
                      activeUsers:
                        type: integer
                        example: 980
                        description: Number of active users
                      activeSubscriptions:
                        type: integer
                        example: 850
                        description: Number of active subscriptions
                      totalStorage:
                        type: integer
                        example: 524288000000
                        description: Total storage used in bytes
                      totalFiles:
                        type: integer
                        example: 45678
                        description: Total number of files
                      totalFolders:
                        type: integer
                        example: 12345
                        description: Total number of folders
                      popularPackages:
                        type: array
                        items:
                          type: object
                          properties:
                            packageId:
                              type: string
                              format: uuid
                            packageName:
                              type: string
                              example: Professional
                            subscriberCount:
                              type: integer
                              example: 450
        "401":
          description: Unauthorized - Invalid or missing token
        "403":
          description: Forbidden - Admin access required

  /admin/stats/revenue:
    get:
      tags:
        - Admin - Statistics
      summary: Get revenue statistics
      description: Retrieve revenue data for a specific date range with breakdown by package
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date
            example: "2024-01-01"
          description: Start date for revenue calculation
        - in: query
          name: to
          schema:
            type: string
            format: date
            example: "2024-12-31"
          description: End date for revenue calculation
      responses:
        "200":
          description: Revenue statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Revenue statistics retrieved successfully
                  data:
                    type: object
                    properties:
                      totalRevenue:
                        type: number
                        format: float
                        example: 125000.50
                        description: Total revenue in the specified period
                      revenue:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                              format: date
                              example: "2024-01-15"
                            amount:
                              type: number
                              format: float
                              example: 5250.00
                      breakdown:
                        type: array
                        items:
                          type: object
                          properties:
                            packageId:
                              type: string
                              format: uuid
                            packageName:
                              type: string
                              example: Professional
                            revenue:
                              type: number
                              format: float
                              example: 45000.00
                            subscriptionCount:
                              type: integer
                              example: 450
        "400":
          description: Bad request - Invalid date range
        "401":
          description: Unauthorized - Invalid or missing token
        "403":
          description: Forbidden - Admin access required

  /admin/stats/usage:
    get:
      tags:
        - Admin - Statistics
      summary: Get system usage statistics
      description: Retrieve usage statistics including top users and storage trends
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Usage statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Usage statistics retrieved successfully
                  data:
                    type: object
                    properties:
                      topUsers:
                        type: array
                        items:
                          type: object
                          properties:
                            userId:
                              type: string
                              format: uuid
                            userName:
                              type: string
                              example: John Doe
                            email:
                              type: string
                              example: john@example.com
                            storageUsed:
                              type: integer
                              example: 10737418240
                              description: Storage used in bytes
                            fileCount:
                              type: integer
                              example: 1250
                            folderCount:
                              type: integer
                              example: 85
                      storageTrend:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                              format: date
                              example: "2024-01-15"
                            totalStorage:
                              type: integer
                              example: 524288000000
                              description: Total storage in bytes
                            fileCount:
                              type: integer
                              example: 45000
                      averageStoragePerUser:
                        type: integer
                        example: 5368709120
                        description: Average storage per user in bytes
                      storageGrowthRate:
                        type: number
                        format: float
                        example: 12.5
                        description: Storage growth rate percentage
        "401":
          description: Unauthorized - Invalid or missing token
        "403":
          description: Forbidden - Admin access required
