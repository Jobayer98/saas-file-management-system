/files/{id}/versions:
  get:
    tags:
      - Files - Versions
    summary: Get file versions
    description: Get all versions of a file
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      200:
        description: File versions retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/FileVersion"

  post:
    tags:
      - Files - Versions
    summary: Create file version
    description: Create a new version of the file
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - file
            properties:
              file:
                type: string
                format: binary
    responses:
      201:
        description: File version created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                data:
                  $ref: "#/components/schemas/FileVersion"

/files/{id}/versions/{versionId}/restore:
  post:
    tags:
      - Files - Versions
    summary: Restore file version
    description: Restore a specific version as the current file
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: versionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      200:
        description: File version restored
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                data:
                  $ref: "#/components/schemas/File"
      404:
        description: Version not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"

/files/{id}/versions/{versionId}:
  delete:
    tags:
      - Files - Versions
    summary: Delete file version
    description: Delete a specific file version
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: versionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      200:
        description: Version deleted successfully
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuccessResponse"

/files/{id}/versions/{versionId}/download:
  get:
    tags:
      - Files - Versions
    summary: Download file version
    description: Download a specific file version
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: versionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      200:
        description: Version file download
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      404:
        description: Version not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"
