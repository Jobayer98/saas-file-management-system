/auth/register:
  post:
    tags:
      - Authentication
    summary: Register a new user
    description: Create a new user account with email verification
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
              - name
            properties:
              email:
                type: string
                format: email
                example: "user@example.com"
              password:
                type: string
                format: password
                minLength: 6
                example: "password123"
              name:
                type: string
                minLength: 2
                example: "John Doe"
    responses:
      201:
        description: User registered successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: "Registration successful. Please check your email to verify your account."
                data:
                  type: object
                  properties:
                    userId:
                      type: string
                      format: uuid
      400:
        description: Validation error or email already exists
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"

/auth/login:
  post:
    tags:
      - Authentication
    summary: Login user
    description: Authenticate user and receive JWT tokens
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
            properties:
              email:
                type: string
                format: email
                example: "admin@example.com"
              password:
                type: string
                format: password
                example: "admin123456"
    responses:
      200:
        description: Login successful
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  type: object
                  properties:
                    token:
                      type: string
                      example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    refreshToken:
                      type: string
                      example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    user:
                      $ref: "#/components/schemas/User"
      401:
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"

/auth/logout:
  post:
    tags:
      - Authentication
    summary: Logout user
    description: Invalidate refresh token
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - refreshToken
            properties:
              refreshToken:
                type: string
    responses:
      200:
        description: Logged out successfully
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuccessResponse"

/auth/verify-email:
  post:
    tags:
      - Authentication
    summary: Verify email address
    description: Verify user email with token from email
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - token
            properties:
              token:
                type: string
    responses:
      200:
        description: Email verified successfully
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuccessResponse"
      400:
        description: Invalid or expired token
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"

/auth/forgot-password:
  post:
    tags:
      - Authentication
    summary: Request password reset
    description: Send password reset email
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
    responses:
      200:
        description: Reset email sent if account exists
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuccessResponse"

/auth/reset-password:
  post:
    tags:
      - Authentication
    summary: Reset password
    description: Reset password with token from email
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - token
              - newPassword
            properties:
              token:
                type: string
              newPassword:
                type: string
                format: password
                minLength: 6
    responses:
      200:
        description: Password reset successfully
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuccessResponse"
      400:
        description: Invalid or expired token
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"

/auth/refresh-token:
  post:
    tags:
      - Authentication
    summary: Refresh access token
    description: Get new access token using refresh token
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - refreshToken
            properties:
              refreshToken:
                type: string
    responses:
      200:
        description: Token refreshed successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  type: object
                  properties:
                    token:
                      type: string
      401:
        description: Invalid or expired refresh token
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"

/auth/me:
  get:
    tags:
      - Authentication
    summary: Get current user
    description: Get authenticated user profile
    responses:
      200:
        description: User profile retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  $ref: "#/components/schemas/User"
      401:
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"
